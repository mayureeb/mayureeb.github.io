---
layout: default
---
<article class="section">
  <div class="wrap wrap--narrow">
    <p class="postfull__meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.source %} · {{ page.source }}{% endif %}</p>
    <h1 class="postfull__title">{{ page.title }}</h1>
    <div class="postfull__body">
      {{ content }}
    </div>
    <p class="postfull__back"><a href="{{ '/blog/' | relative_url }}">← All posts</a></p>
  </div>
</article>

<!-- LaTeX math (loads only on post pages) -->
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
