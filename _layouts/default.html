<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/images/profile_pic.jpg' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="nav" id="top">
    <div class="nav__inner">
      <a class="nav__brand" href="#top">{{ site.data.profile.name }}</a>
      <input type="checkbox" id="nav-toggle" class="nav__toggle-cb">
      <label for="nav-toggle" class="nav__toggle" aria-label="Toggle menu"><span></span></label>
      <nav class="nav__links">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#publications">Publications</a>
        <a href="#experience">Experience</a>
        <a href="{{ site.data.profile.github_url }}" class="nav__icon" aria-label="GitHub" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.21 3.44 9.63 8.21 11.19.6.11.82-.25.82-.57 0-.28-.01-1.02-.02-2-3.34.71-4.04-1.58-4.04-1.58-.55-1.37-1.34-1.74-1.34-1.74-1.09-.73.08-.72.08-.72 1.2.08 1.84 1.21 1.84 1.21 1.07 1.8 2.81 1.28 3.5.98.11-.76.42-1.28.76-1.58-2.67-.3-5.47-1.31-5.47-5.83 0-1.29.47-2.34 1.24-3.17-.12-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.21a11.6 11.6 0 0 1 6 0c2.29-1.53 3.3-1.21 3.3-1.21.66 1.65.24 2.87.12 3.17.77.83 1.24 1.88 1.24 3.17 0 4.53-2.81 5.53-5.49 5.82.43.37.81 1.1.81 2.22 0 1.6-.01 2.89-.01 3.28 0 .32.21.69.83.57A12.04 12.04 0 0 0 24 12.29C24 5.78 18.63.5 12 .5z"/></svg>
        </a>
        <a href="#contact" class="nav__cta">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="wrap footer__inner">
      <span>© {{ site.time | date: '%Y' }} {{ site.data.profile.name }}</span>
      <span class="footer__links">
        <a href="{{ site.data.profile.github_url }}">GitHub</a>
        {% if site.data.profile.scholar_url %}<a href="{{ site.data.profile.scholar_url }}">Scholar</a>{% endif %}
        {% if site.data.profile.linkedin_url %}<a href="{{ site.data.profile.linkedin_url }}">LinkedIn</a>{% endif %}
        <a href="mailto:{{ site.data.profile.email }}">Email</a>
      </span>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
